id: mech:export-restriction-amplification
type: mechanism
name: Export restriction amplifies physical stress
domain: climate volatility
description: |
  Physical stress (drought, crop shortfall) triggers policy response (export restrictions,
  trade barriers) that amplifies the original shock through trade channels. Import-dependent
  buyers face compounded stress: physical shortage plus policy-driven access restriction.
structure_type: correlation/transmission failure
related_branches:
  - breadbasket
related_artifacts:
