id: mech:dual-node-correlation
type: mechanism
name: Dual-node correlation (substitute buffers fail together)
domain: climate volatility
description: |
  Simultaneous stress on primary export node and substitute buffer narrows
  trade diversification options exactly when import-dependent buyers need them most.
  The problem is not absolute collapse but reduced substitutability and hardened price formation.
structure_type: correlation/transmission failure
related_branches:
