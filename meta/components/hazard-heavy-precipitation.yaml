name: Heavy precipitation (extreme rainfall)
domain: climate volatility
description: |
  Extreme rainfall events straining drainage, reservoirs, river management,
  and transport systems. Increasing under climate warming. Creates flood
  stress that infrastructure may be designed for, but followed by drying
  that exposes sequence vulnerability.
