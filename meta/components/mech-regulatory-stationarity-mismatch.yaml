name: Regulatory stationarity mismatch (rules for stable system face volatile reality)
domain: political economy
description: |
  Financial regulation designed for stable, slow-moving banking faces reality
  of fast NBFI runs, wholesale funding, private valuations. Rules assume
  deposit-funded stability; reality is shadow banking volatility. Regulatory
  adaptation lags financial innovation.
