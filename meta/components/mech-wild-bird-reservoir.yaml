id: mech:wild-bird-reservoir
type: mechanism
name: Wild bird reservoir (ongoing reintroduction risk)
domain: biological volatility
description: |
  HPAI H5N1 is enzootic in wild bird populations globally. Wild bird migration
  spreads virus across continents seasonally. Reservoir cannot be eliminated
  with current tools, creating ongoing reintroduction risk for poultry, mammals,
  and other susceptible hosts.
structure_type: design/rule conflict under volatility
related_branches:
