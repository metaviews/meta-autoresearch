  - research/scenarios/2026-04-03-south-american-sea-lion-hpai-mortality.md
metadata:
  failure_mode: biosecurity framework mismatch
  transmission_channel: wild bird migration, environmental contamination
  flyways: Atlantic, Pacific, Central, East Asian-Australasian
